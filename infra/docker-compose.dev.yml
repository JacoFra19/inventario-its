services:
  db:
    image: postgres:16
    container_name: inventario-db
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: inventario
    ports:
      - "5432:5432"
    volumes:
      - inventario_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: python:3.11-slim
    container_name: inventario-api
    working_dir: /app
    volumes:
      - C:/dev/inventario-its/backend:/app:rw
    environment:
      DATABASE_URL: postgresql+psycopg://inventario:inventario@db:5432/inventario
    ports:
      - "8000:8000"
    command: >
      bash -lc "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  inventario_pgdata: